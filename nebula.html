<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>✦ 粒子星云</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05030a}
#bg{position:fixed;inset:0;z-index:0;transition:background 0.15s ease}
#c{position:fixed;inset:0;z-index:2;display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){'use strict';

function makeTex(){
  var s=64,c=document.createElement('canvas');
  c.width=c.height=s;
  var ctx=c.getContext('2d');
  var g=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.04,'rgba(255,255,255,0.9)');
  g.addColorStop(0.12,'rgba(255,255,255,0.5)');
  g.addColorStop(0.28,'rgba(255,255,255,0.12)');
  g.addColorStop(0.5,'rgba(255,255,255,0.03)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,s,s);
  return new THREE.CanvasTexture(c);
}

function gauss(){var u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

// ─── 星云：高斯云团 + 外围星环 ──────────────────
var N=50000;
var pos=new Float32Array(N*3);
var col=new Float32Array(N*3);
var siz=new Float32Array(N);
var aRand=new Float32Array(N);
var alp=new Float32Array(N);

var Nn=40000;

for(var i=0;i<Nn;i++){
  var i3=i*3;
  var layer=Math.random();
  var rx,ry,rz;
  if(layer<0.18){rx=5;ry=3;rz=5}
  else if(layer<0.50){rx=14;ry=6;rz=14}
  else{rx=28;ry=9;rz=28}

  var x=gauss()*rx;
  var y=gauss()*ry*0.7;
  var z=gauss()*rz;

  if(layer<0.18){x+=gauss()*4.0;z+=gauss()*4.0}

  pos[i3]=x;pos[i3+1]=y;pos[i3+2]=z;
  aRand[i]=Math.random();

  var d=Math.sqrt(x*x+y*y+z*z);
  var n=Math.min(d/22,1);

  // 核心暖白蓝 → 中圈粉紫 → 外层冷蓝紫
  var r=0.70-0.30*n+0.06*Math.random();
  var g=0.60-0.25*n+0.05*Math.random();
  var b=0.90-0.15*n+0.06*Math.random();
  col[i3]=Math.min(1,Math.max(0.02,r));
  col[i3+1]=Math.min(1,Math.max(0.02,g));
  col[i3+2]=Math.min(1,Math.max(0.02,b));

  var sz=(2.6-n*2.2)*(0.4+0.6*Math.random());
  siz[i]=Math.max(0.3,sz);
  alp[i]=Math.max(0.04,1-n*0.85);
}

// ─── 外环 ──────────────────────────────────────────
for(var i=Nn;i<N;i++){
  var i3=i*3;
  var ringR=28+Math.random()*14;
  var ang=Math.random()*Math.PI*2;
  var x=ringR*Math.cos(ang);
  var z=ringR*Math.sin(ang);
  var y=gauss()*3.0;

  pos[i3]=x;pos[i3+1]=y;pos[i3+2]=z;
  aRand[i]=Math.random()+0.5;

  var bright=0.3+0.7*Math.random();
  col[i3]=0.60*bright+0.1*Math.random();
  col[i3+1]=0.55*bright+0.1*Math.random();
  col[i3+2]=0.80*bright+0.1*Math.random();
  siz[i]=(0.8+1.2*Math.random())*(1-Math.abs(y)/3);
  alp[i]=0.15+0.25*(1-Math.abs(y)/3);
}

// ─── 着色器 ──────────────────────────────────────────
var vs = [
  'attribute float aSize;','attribute vec3 aColor;','attribute float aRand;','attribute float aAlpha;',
  'varying vec3 vColor;','varying float vAlpha;','varying float vDepth;',
  'uniform float uTime;',
  'void main(){',
  '  vColor=aColor;vAlpha=aAlpha;',
  '  vec3 p=position;',
  '  float dist=length(p.xz);',
  '  float speed=0.50/(dist+0.5);',
  '  float dir=1.0-1.8*clamp((dist-3.0)/12.0,0.0,1.0);',
  '  float angle=atan(p.x,p.z)+uTime*dir*speed+sin(aRand*6.28)*0.15;',
  '  p.x=dist*sin(angle);p.z=dist*cos(angle);',
  '  p.y+=sin(uTime*0.05+p.x*0.01+p.z*0.01)*0.3;',
  '  vec4 mv=modelViewMatrix*vec4(p,1.);',
  '  vDepth=length(mv.xyz);',
  '  gl_PointSize=aSize*(300./length(mv.xyz));',
  '  gl_PointSize=clamp(gl_PointSize,0.3,70.);',
  '  gl_Position=projectionMatrix*mv;',
  '}'
].join('\n');

var fs = [
  'varying vec3 vColor;','varying float vAlpha;','varying float vDepth;',
  'uniform float uTime;',
  'void main(){',
  '  vec2 uv=gl_PointCoord-vec2(0.5);',
  '  float d=length(uv);',
  '  if(d>0.5)discard;',
  '  float glow=0.10/d-0.26;',
  '  glow=clamp(glow,0.,1.);glow*=glow*0.8+0.2;',
  '  float soft=exp(-d*5.);',
  '  float fog=1.0-smoothstep(5.0,60.0,vDepth);',
  '  float a=(glow*0.5+soft*0.5)*vAlpha*fog;',
  '  a=clamp(a,0.,1.);',
  '  float br=0.85+0.15*sin(uTime*0.2+gl_PointCoord.x*8.+gl_PointCoord.y*8.);',
  '  vec3 c=vColor*br*fog;',
  '  gl_FragColor=vec4(c,a);',
  '}'
].join('\n');

// ─── Three.js ────────────────────────────────────────
var canvas=document.getElementById('c');
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(50,canvas.clientWidth/canvas.clientHeight,0.1,500);
camera.position.set(3,5,24);
camera.lookAt(0,0,0);
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
renderer.setSize(canvas.clientWidth,canvas.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0);

var geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('aColor',new THREE.BufferAttribute(col,3));
geo.setAttribute('aSize',new THREE.BufferAttribute(siz,1));
geo.setAttribute('aRand',new THREE.BufferAttribute(aRand,1));
geo.setAttribute('aAlpha',new THREE.BufferAttribute(alp,1));

var tex=makeTex();
var mat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:vs,fragmentShader:fs,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});

var pt=new THREE.Points(geo,mat);
pt.frustumCulled=false;
var grp=new THREE.Group();
grp.add(pt);
grp.rotation.x=0.45;grp.rotation.z=0.12;
scene.add(grp);

// ─── 背景呼吸 ──────────────────────────────────────
var bgEl=document.getElementById('bg');
function updateBg(t){
  var ph=(Math.sin(t*0.0003)+1)*0.5;
  var ep=ph*ph*(3-2*ph);
  var h=function(r){return Math.round(r).toString(16).padStart(2,'0')};
  var n1r=26,n1g=10,n1b=48;
  var n2r=6,n2g=2,n2b=10;
  var d1r=42,d1g=32,d1b=55;
  var d2r=20,d2g=16,d2b=28;
  var r1=Math.round(n1r+(d1r-n1r)*ep);
  var g1=Math.round(n1g+(d1g-n1g)*ep);
  var b1=Math.round(n1b+(d1b-n1b)*ep);
  var r2=Math.round(n2r+(d2r-n2r)*ep);
  var g2=Math.round(n2g+(d2g-n2g)*ep);
  var b2=Math.round(n2b+(d2b-n2b)*ep);
  bgEl.style.background='radial-gradient(ellipse at 50% 50%,#'+
    h(r1)+h(g1)+h(b1)+' 0%,#'+h(r2)+h(g2)+h(b2)+' 80%)';
}

function animate(time){
  requestAnimationFrame(animate);
  var b=1+Math.sin(time*0.0003)*0.008;
  grp.scale.set(b,b,b);
  mat.uniforms.uTime.value=time/1000;
  updateBg(time);
  renderer.render(scene,camera);
}
function resize(){
  var w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
}
window.addEventListener('resize',resize);
animate(0);
})();
</script>
</body>
</html>
