<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>☁️ 粒子云</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0c10}

/* 单一背景层，由 JS 实时驱动渐变 */
#bg{
  position:fixed;inset:0;z-index:0;
  transition: none;
}

#c{
  position:fixed;inset:0;z-index:2;
  display:block;width:100vw;height:100vh;
}

#loading{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;
  color:rgba(255,255,255,0.2);font:13px/1 'SF Mono','Cascadia Code','Consolas',monospace;
  letter-spacing:.3em;text-transform:uppercase;animation:pulse 1.8s ease-in-out infinite
}
@keyframes pulse{0%,100%{opacity:.15}50%{opacity:.55}}
</style>
</head>
<body>

<div id="bg"></div>
<div id="loading">✦ 粒子云生成中 ✦</div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(function(){'use strict';

var COUNT = 20000;
var pos   = new Float32Array(COUNT * 3);
var col   = new Float32Array(COUNT * 3);
var siz   = new Float32Array(COUNT);

function gauss(){
  var u=0,v=0;
  while(u===0)u=Math.random();
  while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

for(var i=0;i<COUNT;i++){
  var i3=i*3, layer=Math.random();
  var sx,sy,sz;
  if(layer<0.5){sx=6;sy=4;sz=6}
  else if(layer<0.8){sx=14;sy=8;sz=14}
  else{sx=26;sy=14;sz=26}

  var x=gauss()*sx, y=gauss()*sy*0.6, z=gauss()*sz;
  if(layer<0.5){x+=gauss()*2;z+=gauss()*2}

  pos[i3]=x;pos[i3+1]=y;pos[i3+2]=z;

  var dist=Math.sqrt(x*x+y*y+z*z), n=Math.min(dist/30,1);
  // 核心暖紫(0.60,0.28,0.78) → 边缘冷蓝紫(0.35,0.32,0.82)
  col[i3]  =0.60-0.25*n+0.06*Math.random();
  col[i3+1]=0.28+0.04*n+0.06*Math.random();
  col[i3+2]=0.78+0.04*n+0.06*Math.random();

  siz[i]=(3.0-n*2.4)*(0.5+0.5*Math.random());
}

// ======================================================================
// 着色器 — 颜色随时间呼吸
// ======================================================================

var vs = [
  'attribute float aSize;',
  'attribute vec3 aColor;',
  'varying vec3 vColor;',
  'varying float vAlpha;',
  'varying float vDist;',
  'uniform float uTime;',
  'void main(){',
  '  vColor = aColor;',
  '  float wave = sin(uTime*0.12 + position.y*0.05 + position.x*0.03)*0.12;',
  '  vec3 p = vec3(position.x, position.y+wave, position.z);',
  '  vec4 mv = modelViewMatrix * vec4(p, 1.0);',
  '  gl_PointSize = aSize * (280.0 / -mv.z);',
  '  gl_PointSize = clamp(gl_PointSize, 1.0, 80.0);',
  '  gl_Position = projectionMatrix * mv;',
  '  float d = length(p.xyz);',
  '  vDist = d;',
  '  vAlpha = 1.0 - smoothstep(0.0, 35.0, d);',
  '  vAlpha = max(vAlpha, 0.04);',
  '}'
].join('\n');

var fs = [
  'varying vec3 vColor;',
  'varying float vAlpha;',
  'varying float vDist;',
  'uniform float uTime;',
  'void main(){',
  '  vec2 uv = gl_PointCoord - vec2(0.5);',
  '  float d = length(uv);',
  '  if(d > 0.5) discard;',
  '',
  '  // 柔和光晕 — 降低中心亮度',
  '  float glow = 0.10 / d - 0.25;',
  '  glow = clamp(glow, 0.0, 1.0);',
  '  glow *= glow; // 二次衰减，让中心更柔和',
  '',
  '  float soft = exp(-d * 4.0);',
  '  float alpha = glow * vAlpha * 0.6 + soft * vAlpha * 0.4;',
  '  alpha = clamp(alpha, 0.0, 1.0);',
  '',
  '  // 颜色呼吸：明度随时间微微起伏',
  '  float breathe = 0.85 + 0.15 * sin(uTime * 0.3 + vDist * 0.05);',
  '  vec3 c = vColor * breathe;',
  '',
  '  // 中心略微发白',
  '  c = mix(c, vec3(1.0), glow * 0.15);',
  '',
  '  gl_FragColor = vec4(c, alpha);',
  '}'
].join('\n');

// ======================================================================
// Three.js
// ======================================================================

var canvas = document.getElementById('c');
var scene  = new THREE.Scene();

var camera = new THREE.PerspectiveCamera(60, canvas.clientWidth/canvas.clientHeight, 0.1, 200);
camera.position.set(0, 2, 28);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
renderer.setSize(canvas.clientWidth, canvas.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

var geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
geo.setAttribute('aSize',    new THREE.BufferAttribute(siz, 1));

var mat = new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:vs,
  fragmentShader:fs,
  transparent:true,
  depthWrite:false,
  blending:THREE.AdditiveBlending,
});

var points = new THREE.Points(geo, mat);
points.frustumCulled = false;

var group = new THREE.Group();
group.add(points);
group.rotation.x = 0.4;
group.rotation.z = 0.2;
scene.add(group);

// ======================================================================
// 背景呼吸（单层 JS 驱动）
// ======================================================================

var bgEl = document.getElementById('bg');

// 两套色调：暗冷 / 暖亮 — 随时间循环过渡
function updateBg(t){
  // 0→1 循环呼吸
  var phase = (Math.sin(t * 0.0003) + 1) * 0.5; // 0~1 slow loop

  // 暗冷端：深紫灰 → 极暗
  var c1_r = 0.10, c1_g = 0.07, c1_b = 0.13;
  var c2_r = 0.04, c2_g = 0.04, c2_b = 0.05;

  // 暖亮端：紫灰 → 暖灰
  var c3_r = 0.28, c3_g = 0.22, c3_b = 0.32;
  var c4_r = 0.14, c4_g = 0.12, c4_b = 0.16;

  // 根据 phase 插值
  var p = phase;
  // 用 ease-in-out 让过渡更平滑
  var ep = p * p * (3 - 2 * p); // smoothstep

  var r1 = c1_r + (c3_r - c1_r) * ep;
  var g1 = c1_g + (c3_g - c1_g) * ep;
  var b1 = c1_b + (c3_b - c1_b) * ep;

  var r2 = c2_r + (c4_r - c2_r) * ep;
  var g2 = c2_g + (c4_g - c2_g) * ep;
  var b2 = c2_b + (c4_b - c2_b) * ep;

  // 转换为 CSS 百分比颜色
  var toHex = function(r){return Math.round(r*255).toString(16).padStart(2,'0')};
  var col1 = '#'+toHex(r1)+toHex(g1)+toHex(b1);
  var col2 = '#'+toHex(r2)+toHex(g2)+toHex(b2);

  bgEl.style.background = 'radial-gradient(ellipse at 50% 50%, '+col1+' 0%, '+col2+' 80%)';
}

// ======================================================================
// 动画
// ======================================================================

function animate(time){
  requestAnimationFrame(animate);
  group.rotation.y += 0.0012;
  var b = 1.0 + Math.sin(time * 0.0004) * 0.01;
  group.scale.set(b, b, b);
  mat.uniforms.uTime.value = time / 1000;
  updateBg(time);
  renderer.render(scene, camera);
}

function resize(){
  var w=window.innerWidth, h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);

document.getElementById('loading').style.display='none';
animate(0);

})();
</script>
</body>
</html>
